<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>J'Snaps Overlay</title>
  <link rel="stylesheet" href="overlay.css">
  <style>
    /* Ensure the body is perfectly transparent and covers the screen */
    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      user-select: none;
    }
  </style>
</head>
<body>
  <script src="overlay.js"></script>
</body>
</html>
